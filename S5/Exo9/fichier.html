<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Couleur</title>
</head>

<body>
  <h3> Changer la couleur de cette page</h3>
  <p>Valeur du rouge : <input type="number" id="R" min="0" max="255" value="200"></p>
  
  <p>Valeur du vert : <input type="number" id="V" min="0" max="255" value="100"></p>
  
  <p>Valeur du bleu : <input type="number" id="B" min="0" max="255" value="50"></p>
  
  <p><input type="button" value="Cliquer !" onclick="Couleur()"></p>
  
</body>

</html>
